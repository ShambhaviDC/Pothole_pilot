{% extends "potholes/base.html" %}
{% load static %}

{% block title %}Map View - Pothole Pilot{% endblock %}

{% block extra_css %}
<!-- Leaflet.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
    .map-header {
        background: #1a1d20;
        color: white;
        padding: 30px 0;
        border-bottom: 5px solid #0d6efd;
    }
    #map-wrapper {
        position: relative;
        width: 100%;
        height: 600px;
        margin-top: 20px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    #map {
        width: 100%;
        height: 100%;
        background: #f0f0f0;
    }
    #map-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        background: rgba(255,255,255,0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .custom-popup img {
        width: 100%;
        border-radius: 4px;
        margin-top: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="map-header">
    <div class="container text-center">
        <h1 class="fw-bold fs-2"><i class="bi bi-geo-alt-fill me-2"></i>Pothole Pilot Tracker</h1>
        <div class="d-flex justify-content-center gap-3 mt-3">
            <span class="badge rounded-pill bg-danger">Critical</span>
            <span class="badge rounded-pill bg-warning text-dark">Warning</span>
            <span class="badge rounded-pill bg-success">Low</span>
        </div>
    </div>
</div>

<div class="container">
    <div id="map-wrapper">
        <div id="map-overlay">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="fw-bold text-muted">Building Real-Time Map...</p>
        </div>
        <div id="map"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Core Leaflet Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
/**
 * BULLETPROOF MAP INITIALIZER
 * Inlined to avoid any script-dependency issues.
 */
document.addEventListener("DOMContentLoaded", function() {
    console.log("DOM Ready, starting Map Engine...");
    
    // Safety check for Leaflet library
    if (typeof L === 'undefined') {
        document.getElementById('map-overlay').innerHTML = `
            <div class="text-danger text-center p-4">
                <i class="bi bi-exclamation-triangle" style="font-size: 2rem;"></i>
                <p class="mt-2">Failed to load Map Engine (Leaflet).<br>Please check your internet connection.</p>
                <button onclick="window.location.reload()" class="btn btn-sm btn-outline-danger mt-2">Retry</button>
            </div>`;
        return;
    }

    const map = L.map('map').setView([40.7128, -74.0060], 13);
    
    // High-reliability Tile Layer (CartoDB)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB',
        maxZoom: 20
    }).addTo(map);

    const FIXED_RADIUS_KM = 5; // 5km radius
    let userLocation = null;
    let radiusCircle = null;

    // Haversine formula to calculate distance in KM
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }

    // Step 1: Get User Location
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(position => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            userLocation = [lat, lng];
            
            map.setView(userLocation, 13);

            // Add User Marker
            L.marker(userLocation).addTo(map)
                .bindPopup("<b>You are here</b>")
                .openPopup();

            // Draw Radius Circle
            radiusCircle = L.circle(userLocation, {
                radius: FIXED_RADIUS_KM * 1000,
                color: '#0d6efd',
                fillColor: '#0d6efd',
                fillOpacity: 0.1,
                dashArray: '5, 10'
            }).addTo(map);

            loadPotholes();
        }, () => {
            alert("Could not get your location. Showing all potholes instead.");
            loadPotholes();
        });
    } else {
        loadPotholes();
    }

    function loadPotholes() {
        // Load Potholes
        fetch('/api/potholes/')
            .then(response => response.json())
            .then(data => {
                const markers = [];
                
                data.forEach(p => {
                    // Filter by radius if userLocation is available
                    if (userLocation) {
                        const dist = getDistance(userLocation[0], userLocation[1], p.latitude, p.longitude);
                        if (dist > FIXED_RADIUS_KM) return; // Skip if outside radius
                    }

                    const color = p.severity === 'High' ? '#dc3545' : (p.severity === 'Moderate' ? '#ffc107' : '#198754');
                    const markerData = L.circleMarker([p.latitude, p.longitude], {
                        radius: 10,
                        fillColor: color,
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);

                    const statusColor = p.status === 'Fixed' ? 'text-success' : (p.status === 'Invalid' ? 'text-danger' : 'text-primary');

                    markerData.bindPopup(`
                        <div class="custom-popup" style="width:240px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-secondary">#${p.id}</span>
                                <span class="fw-bold fs-7 ${statusColor}">${p.status.toUpperCase()}</span>
                            </div>
                            <h6 class="mb-1 fw-bold">${p.description || 'Pothole Report'}</h6>
                            <p class="text-muted small mb-2"><i class="bi bi-geo-alt"></i> Ward ${p.ward_number}</p>
                            
                            ${p.image ? `<img src="${p.image}" class="mb-2 shadow-sm">` : ''}
                            
                            <div class="bg-light p-2 rounded mb-2">
                                <div class="d-flex justify-content-between small">
                                    <span>Severity:</span>
                                    <span class="fw-bold" style="color:${color}">${p.severity}</span>
                                </div>
                                <div class="d-flex justify-content-between small">
                                    <span>Community Votes:</span>
                                    <span class="fw-bold">${p.vote_count}</span>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <a href="/pothole/${p.id}/" class="btn btn-primary btn-sm">
                                    <i class="bi bi-info-circle me-1"></i> More Details
                                </a>
                                <a href="https://maps.google.com/?q=${p.latitude},${p.longitude}" target="_blank" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-map me-1"></i> Directions
                                </a>
                            </div>
                        </div>
                    `, { maxWidth: 300 });
                    markers.push([p.latitude, p.longitude]);
                });

                if (!userLocation && markers.length > 0) {
                    map.fitBounds(L.latLngBounds(markers), { padding: [40, 40] });
                }
                
                document.getElementById('map-overlay').style.display = 'none';
            })
            .catch(err => {
                console.error("API Error:", err);
                document.getElementById('map-overlay').style.display = 'none';
            });
    }

    // RE-DRAW FIX
    const forceRefresh = setInterval(() => {
        map.invalidateSize();
    }, 500);
    setTimeout(() => clearInterval(forceRefresh), 5000);
});
</script>
{% endblock %}
