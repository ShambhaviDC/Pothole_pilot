{% extends "potholes/base.html" %}
{% load static %}

{% block title %}Map View - Pothole Pilot{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">Pothole Map</h1>
            <div id="map"
                style="width: 100%; height: 600px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>
        </div>
    </div>
</div>

<script async defer
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"></script>

<script src="{% static 'js/map.js' %}"></script>
<script>
    // Proxy function to match Google Maps callback requirement
    function initMap() {
        if (typeof PotholeMap !== 'undefined') {
            PotholeMap.init();
        }
    }
</script>
{% endblock %}
